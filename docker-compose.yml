version: "3.9"
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: imi
      POSTGRES_USER: imi
      POSTGRES_PASSWORD: imi_dev
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tsdb_data:
