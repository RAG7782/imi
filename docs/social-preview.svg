<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Title -->
  <text x="640" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="white">IMI</text>
  <text x="640" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a78bfa">Integrated Memory Intelligence</text>

  <!-- Tagline -->
  <text x="640" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#e2e8f0" font-style="italic">RAG finds what's similar. IMI finds what matters.</text>

  <!-- Features bar -->
  <rect x="140" y="400" width="1000" height="50" rx="25" fill="url(#accent)" opacity="0.15"/>
  <text x="640" y="433" text-anchor="middle" font-family="monospace" font-size="18" fill="#c4b5fd">temporal decay  ·  affordances  ·  graph multi-hop  ·  adaptive rw  ·  zero LLM at query</text>

  <!-- Stats -->
  <text x="280" y="530" text-anchor="middle" font-family="monospace" font-size="20" fill="#94a3b8">84 tests</text>
  <text x="520" y="530" text-anchor="middle" font-family="monospace" font-size="20" fill="#94a3b8">6 MCP tools</text>
  <text x="760" y="530" text-anchor="middle" font-family="monospace" font-size="20" fill="#94a3b8">REST API</text>
  <text x="1000" y="530" text-anchor="middle" font-family="monospace" font-size="20" fill="#94a3b8">AMBench</text>

  <!-- Divider dots -->
  <circle cx="400" cy="525" r="3" fill="#4a5568"/>
  <circle cx="640" cy="525" r="3" fill="#4a5568"/>
  <circle cx="880" cy="525" r="3" fill="#4a5568"/>

  <!-- Bottom -->
  <text x="640" y="600" text-anchor="middle" font-family="monospace" font-size="16" fill="#64748b">pip install imi-memory  ·  github.com/RAG7782/imi  ·  MIT License</text>
</svg>
